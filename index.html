<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AURA | The Invisible Art</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet">
    <style>
      :root {
        --cursor-size: 20px;
        --cursor-outline-size: 60px;
      }
      
      body {
        background-color: #F9F9F7;
        color: #1A1A15;
        overflow-x: hidden;
      }

      /* Hide Scrollbar */
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }
      
      .blend-screen { mix-blend-mode: screen; }
      .blend-overlay { mix-blend-mode: overlay; }
      .blend-diff { mix-blend-mode: difference; }

      /* Grain Effect */
      .bg-grain {
        position: fixed;
        top: -50%;
        left: -50%;
        right: -50%;
        bottom: -50%;
        width: 200%;
        height: 200vh;
        background: transparent url('http://assets.iceable.com/img/noise-transparent.png') repeat 0 0;
        background-repeat: repeat;
        animation: grain 8s steps(10) infinite;
        opacity: 0.03;
        z-index: 9998; /* Below cursor */
        pointer-events: none;
      }

      @media (hover: none) {
        body { cursor: auto; }
        .cursor-dot, .cursor-follower { display: none; }
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <div class="bg-grain"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
